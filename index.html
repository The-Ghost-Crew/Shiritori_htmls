<script>

const DIGITS = "0123456789ABCDEFG";

function fromBase17(str) {

    let n = 0n;

    for (const c of str) {

        const digit = DIGITS.indexOf(c);

        if (digit === -1) {
            return null;
        }

        n *= 17n;
        n += BigInt(digit);
    }

    return n;
}

function expectedCheck(id, salt) {

    return (
        (id * 37n) +
        (salt * 91n) +
        (id % 13n) +
        (salt % 7n)
    ) % 99999999n;
}

function verifyCode() {

    const code =
        document
            .getElementById("codeBox")
            .value
            .trim()
            .toUpperCase();

    if (code === "GHOST*") {

        location.href = "developer.html";
        return;
    }

    const parts = code.split("-");

    if (parts.length !== 4) {

        error.innerText = "Invalid format.";
        return;
    }

    const page = parts[0];

    if (!["A", "B", "C"].includes(page)) {

        error.innerText = "Invalid page key.";
        return;
    }

    const idNum = fromBase17(parts[1]);
    const saltNum = fromBase17(parts[2]);
    const checkNum = fromBase17(parts[3]);

    if (
        idNum === null ||
        saltNum === null ||
        checkNum === null
    ) {

        error.innerText = "Invalid characters.";
        return;
    }

    const shouldBe =
        expectedCheck(idNum, saltNum);

    if (checkNum !== shouldBe) {

        error.innerText = "Access denied.";
        return;
    }

    localStorage.setItem(
        "tester_id",
        idNum.toString()
    );

    if (page === "A") {
        location.href = "page-a/";
    }

    if (page === "B") {
        location.href = "page-b/";
    }

    if (page === "C") {
        location.href = "page-c/";
    }
}

</script>
